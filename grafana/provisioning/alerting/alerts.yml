apiVersion: 1

groups:
  - orgId: 1
    name: PLC4X Alerts
    folder: PLC4X Manager
    interval: 30s
    rules:
      - uid: device-offline
        title: "Device Offline"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB-PLC4X
            model:
              query: |
                from(bucket: "plc4x_raw")
                  |> range(start: -5m)
                  |> filter(fn: (r) => r._measurement == "plc4x_health")
                  |> filter(fn: (r) => r._field == "status")
                  |> filter(fn: (r) => r._value == 1)
                  |> last()
                  |> group()
                  |> count()
              intervalMs: 30000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        noDataState: Alerting
        execErrState: OK
        for: 1m
        annotations:
          summary: "One or more devices are offline or unreachable"
        labels:
          severity: critical

      - uid: high-latency
        title: "High Read Latency"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB-PLC4X
            model:
              query: |
                from(bucket: "plc4x_raw")
                  |> range(start: -5m)
                  |> filter(fn: (r) => r._measurement == "plc4x_health")
                  |> filter(fn: (r) => r._field == "latency_ms")
                  |> mean()
              intervalMs: 30000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [2000]
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: "Device read latency exceeds 2 seconds"
        labels:
          severity: warning

      - uid: anomaly-detected
        title: "ML Anomaly Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: InfluxDB-PLC4X
            model:
              query: |
                from(bucket: "plc4x_raw")
                  |> range(start: -10m)
                  |> filter(fn: (r) => r._measurement == "plc4x_anomaly")
                  |> filter(fn: (r) => r._field == "is_anomaly")
                  |> last()
                  |> filter(fn: (r) => r._value == 1)
                  |> group()
                  |> count()
              intervalMs: 60000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: "AI detected anomalous behavior in one or more tags"
        labels:
          severity: warning

      - uid: no-data
        title: "No Data from Poller"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB-PLC4X
            model:
              query: |
                from(bucket: "plc4x_raw")
                  |> range(start: -5m)
                  |> filter(fn: (r) => r._measurement == "plc4x_tags")
                  |> group()
                  |> count()
              intervalMs: 30000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "No data received from PLC poller in the last 5 minutes"
        labels:
          severity: critical

      - uid: tag-errors
        title: "High Tag Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB-PLC4X
            model:
              query: |
                from(bucket: "plc4x_raw")
                  |> range(start: -5m)
                  |> filter(fn: (r) => r._measurement == "plc4x_health")
                  |> filter(fn: (r) => r._field == "tags_error")
                  |> last()
                  |> group()
                  |> sum()
              intervalMs: 30000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: "More than 10 tags are failing to read"
        labels:
          severity: warning
