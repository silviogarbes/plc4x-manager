apiVersion: 1
datasources:
  - name: InfluxDB-PLC4X
    uid: InfluxDB-PLC4X
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: plc4x
      defaultBucket: plc4x_raw
      tlsSkipVerify: false
    secureJsonData:
      # Note: Grafana provisioning YAML does not support env var substitution here.
      # To change the token, update this file directly or reprovision via the Grafana UI.
      token: plc4x-token
    isDefault: true
    editable: false

  - name: MQTT-PLC4X
    uid: MQTT-PLC4X
    type: grafana-mqtt-datasource
    access: proxy
    jsonData:
      uri: tcp://mosquitto:1883
      username: plc4x
    secureJsonData:
      password: plc4x
    editable: false
