listener 1883
allow_anonymous false
# IMPORTANT: Create the password file before starting the broker.
# Run: docker run --rm -it -v mosquitto-data:/mosquitto/data eclipse-mosquitto:2 \
#        mosquitto_passwd -c /mosquitto/data/passwd <username>
# Then mount the file by adding to docker-compose volumes:
#   - mosquitto-data:/mosquitto/data
# (already mounted) — the file will be at /mosquitto/data/passwd
password_file /mosquitto/data/passwd
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type error
